
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報告書 自動チェッカー</title>
    
    <!-- 外部ライブラリの読み込み (Tailwind CSS, Lucide Icons, SheetJS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* カスタムアニメーション設定 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">

    <!-- ヘッダー -->
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="check-circle" class="w-7 h-7 text-indigo-200"></i>
                <h1 class="text-xl font-bold">報告書 自動チェッカー</h1>
            </div>
            <div class="text-sm text-indigo-200 font-medium bg-indigo-700/50 px-3 py-1 rounded-full">
                Single HTML App
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8 space-y-6">
        
        <!-- 設定パネル用コンテナ -->
        <div id="settings-container"></div>

        <!-- アップロードゾーン -->
        <div class="relative group" id="upload-zone">
            <input 
                type="file" 
                id="file-input"
                multiple 
                accept=".xlsx, .csv"
                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                title="ファイルを選択"
            />
            <div id="upload-box" class="bg-indigo-50 border-2 border-dashed border-indigo-300 rounded-xl p-10 text-center transition-all group-hover:bg-indigo-100 group-hover:border-indigo-400">
                <i data-lucide="upload-cloud" class="w-12 h-12 mx-auto text-indigo-400 mb-4 group-hover:scale-110 transition-transform duration-300"></i>
                <h3 class="text-lg font-bold text-indigo-900 mb-2">エクセル・CSVファイルをドロップ、またはクリック</h3>
                <p class="text-sm text-indigo-600">複数ファイルを一括でアップロードできます（様式第8-3号対応）</p>
            </div>
        </div>

        <!-- 解析対象一覧・結果表示コンテナ -->
        <div id="reports-container"></div>

    </main>

    <!-- トースト通知コンテナ -->
    <div id="toast-container"></div>

    <script>
        /** --- グローバルステートと初期設定 --- */
        
        const defaultConfig = {
            period: "2026年1月11日～2026年2月20日（1か月10日）",
            location: "株式会社151A　self-A・151A魚津（富山県魚津市上村木1丁目8-6）",
            course: "AI＆DXアドバンス講座：最先端のビジネス活用",
            webhookUrl: "",
            geminiApiKey: "" 
        };

        // ローカルストレージからの読み込み
        let savedConfig = {};
        try {
            const rawConfig = localStorage.getItem('reportCheckerConfig');
            if (rawConfig) savedConfig = JSON.parse(rawConfig);
        } catch (e) {
            console.error("Config load error", e);
        }

        const state = {
            config: { ...defaultConfig, ...savedConfig },
            reports: [],
            isChecking: false,
            isSending: false,
            isConfigOpen: false,
            isGasHelpOpen: false,
            expandedRowId: null
        };

        // GASのコードスニペット
        const gasCode = `function doPost(e) {
  try {
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    const data = JSON.parse(e.postData.contents);
    
    if (sheet.getLastRow() === 0) {
      sheet.appendRow([
        "ファイル名", "事業所名", "受講者氏名", "総合判定",
        "【形式】事業所名", "【形式】氏名", "【形式】実施期間", "【形式】実施場所", "【形式】コース名",
        "文字数", "形式NG詳細", "【内容】AI判定", "内容NG詳細", "内容改善案", "送信日時"
      ]);
    }
    
    data.forEach(row => {
      sheet.appendRow([
        row.fileName, row.companyName, row.userName, row.overallPass,
        row.chkCompany, row.chkUser, row.chkPeriod, row.chkLocation, row.chkCourse,
        row.contentLength, row.formatErrors, row.aiPass, row.aiNgReasons, row.improvementSuggestion,
        new Date()
      ]);
    });
    
    return ContentService.createTextOutput("Success").setMimeType(ContentService.MimeType.TEXT);
  } catch (error) {
    return ContentService.createTextOutput("Error: " + error.toString()).setMimeType(ContentService.MimeType.TEXT);
  }
}`;

        /** --- ユーティリティ関数 --- */
        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function saveConfig() {
            localStorage.setItem('reportCheckerConfig', JSON.stringify(state.config));
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // typeが 'info' の場合は青色にする（待機中のお知らせ用）
            let bgColor = 'bg-blue-600';
            let icon = 'alert-circle';
            if (type === 'success') { bgColor = 'bg-green-600'; icon = 'check-circle'; }
            else if (type === 'error') { bgColor = 'bg-red-600'; icon = 'alert-circle'; }
            else if (type === 'info') { bgColor = 'bg-indigo-500'; icon = 'loader-2'; }
            
            const iconClass = type === 'info' ? 'animate-spin' : '';

            toast.className = `fixed bottom-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50 animate-fade-in-up transition-opacity duration-300`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 ${iconClass}"></i><span class="font-medium">${escapeHTML(message)}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons({root: toast});
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        /** --- グローバルAPIオブジェクト (HTMLから呼び出す用) --- */
        window.app = {
            toggleConfig: () => { state.isConfigOpen = !state.isConfigOpen; renderSettings(); },
            toggleGasHelp: () => { state.isGasHelpOpen = !state.isGasHelpOpen; renderSettings(); },
            updateConfig: (key, value) => {
                state.config[key] = value;
                saveConfig();
                renderSettings();
            },
            resetConfig: () => {
                if(confirm("設定とAPIキーの記憶をすべて初期化しますか？")) {
                    localStorage.removeItem('reportCheckerConfig');
                    state.config = { ...defaultConfig };
                    app.updateConfig('geminiApiKey', '');
                    renderSettings();
                    showToast("設定を初期化しました。新しいAPIキーを入力してください。", "success");
                }
            },
            toggleRow: (id) => {
                state.expandedRowId = state.expandedRowId === id ? null : id;
                renderReports();
            },
            removeReport: (id) => {
                state.reports = state.reports.filter(r => r.id !== id);
                renderReports();
            },
            handleContentInput: (id, value) => {
                const countSpan = document.getElementById(`count-${id}`);
                if (countSpan) {
                    countSpan.textContent = `${value.length} / 300文字以上`;
                    countSpan.className = value.length < 300 ? "text-red-500" : "text-green-600";
                }
            },
            updateReportData: (id, field, value) => {
                const report = state.reports.find(r => r.id === id);
                if (report) {
                    report.data[field] = value;
                    report.status = 'pending';
                    renderReports();
                }
            },
            copyGasCode: () => {
                const textArea = document.createElement("textarea");
                textArea.value = gasCode;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('コードをコピーしました');
                } catch (err) {
                    showToast('コピーに失敗しました', 'error');
                }
                document.body.removeChild(textArea);
            },
            runChecks: async () => { await runChecksLogic(); },
            sendToSpreadsheet: async () => { await sendToSpreadsheetLogic(); },
            handleFileUploadWrapper: (files) => { handleFileUpload(files); }
        };

        /** --- ドラッグ＆ドロップとファイル入力の設定 --- */
        const dropZone = document.getElementById('upload-zone');
        const uploadBox = document.getElementById('upload-box');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('bg-indigo-100', 'border-indigo-400');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('bg-indigo-100', 'border-indigo-400');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('bg-indigo-100', 'border-indigo-400');
            if (e.dataTransfer.files.length) {
                app.handleFileUploadWrapper(e.dataTransfer.files);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                app.handleFileUploadWrapper(e.target.files);
                e.target.value = '';
            }
        });

        /** --- データ抽出・解析ロジック --- */
        const extractFromGrid = (json) => {
            let data = { companyName: '', userName: '', period: '', location: '', course: '', content: '' };
            let inContentSection = false;
            let contentRows = [];

            for (let i = 0; i < json.length; i++) {
                const row = json[i];
                const rowStr = row.join("");
                const cleanRowStr = rowStr.replace(/\s+/g, '');
                
                if (cleanRowStr.includes("事業所の名称") && !data.companyName) {
                    const startIdx = row.findIndex(c => c && c.toString().replace(/\s+/g, '').includes("事業所の名称"));
                    const endIdx = row.findIndex(c => c && c.toString().replace(/\s+/g, '').includes("受講者氏名"));
                    if (startIdx !== -1) {
                        data.companyName = row.slice(startIdx + 1, endIdx !== -1 ? endIdx : undefined).join("").trim();
                    } else {
                        data.companyName = row.slice(1).join("").replace(/^,+/, "").trim();
                    }
                }
                if (cleanRowStr.includes("受講者氏名") && !data.userName) {
                    const idx = row.findIndex(c => c && c.toString().replace(/\s+/g, '').includes("受講者氏名"));
                    if (idx !== -1) data.userName = row.slice(idx+1).join("").trim();
                    else data.userName = row.slice(1).join("").replace(/^,+/, "").trim();
                }
                if (cleanRowStr.includes("訓練の実施期間") && !data.period) {
                    const idx = row.findIndex(c => c && c.toString().replace(/\s+/g, '').includes("訓練の実施期間"));
                    if (idx !== -1) data.period = row.slice(idx + 1).join("").trim();
                    else data.period = row.slice(1).join("").replace(/^,+/, "").trim();
                }
                if (cleanRowStr.includes("訓練の実施場所") && !data.location) {
                    const idx = row.findIndex(c => c && c.toString().replace(/\s+/g, '').includes("訓練の実施場所"));
                    if (idx !== -1) data.location = row.slice(idx + 1).join("").trim();
                    else data.location = row.slice(1).join("").replace(/^,+/, "").trim();
                }
                if (cleanRowStr.includes("訓練コースの名称") && !data.course) {
                    const idx = row.findIndex(c => c && c.toString().replace(/\s+/g, '').includes("訓練コースの名称"));
                    if (idx !== -1) {
                        let val = row.slice(idx + 1).join("").trim();
                        if (val) data.course = val;
                        else if (i+1 < json.length) data.course = json[i+1].join("").trim();
                    } else {
                        let val = row.slice(1).join("").replace(/^,+/, "").trim();
                        if (val) data.course = val;
                        else if (i+1 < json.length) data.course = json[i+1].join("").replace(/^,+/, "").trim();
                    }
                }

                if (cleanRowStr.includes("内容(学んだこと") || cleanRowStr.includes("内容（学んだこと")) {
                    inContentSection = true;
                    continue; 
                }

                if (inContentSection) {
                    if (cleanRowStr.includes("※以下の内容に該当する") || cleanRowStr.includes("上記の内容に誤りがない") || cleanRowStr.includes("事業主記載欄")) {
                        inContentSection = false;
                    } else {
                        const text = row.join("").replace(/^,+/, "").trim();
                        if (text) contentRows.push(text);
                    }
                }
            }
            data.content = contentRows.join("\n");
            return data;
        };

        const parseFile = async (file) => {
            if (file.name.endsWith('.csv')) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        const rows = [];
                        let inQuotes = false;
                        let currentRow = [];
                        let currentCell = "";
                        for(let i=0; i<text.length; i++) {
                            const char = text[i];
                            if (char === '"') inQuotes = !inQuotes;
                            else if (char === ',' && !inQuotes) {
                                currentRow.push(currentCell); currentCell = "";
                            } else if (char === '\n' && !inQuotes) {
                                currentRow.push(currentCell); rows.push(currentRow);
                                currentRow = []; currentCell = "";
                            } else {
                                if (char !== '\r') currentCell += char;
                            }
                        }
                        if (currentCell || currentRow.length > 0) { currentRow.push(currentCell); rows.push(currentRow); }
                        resolve(extractFromGrid(rows));
                    };
                    reader.readAsText(file, 'Shift_JIS'); 
                });
            } else {
                return new Promise((resolve, reject) => {
                    if (!window.XLSX) {
                        reject(new Error("Excel library not ready."));
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = window.XLSX.read(data, {type: 'array'});
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = window.XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                        resolve(extractFromGrid(json));
                    };
                    reader.readAsArrayBuffer(file);
                });
            }
        };

        const handleFileUpload = async (filesArray) => {
            const files = Array.from(filesArray);
            if (files.some(f => f.name.endsWith('.xlsx')) && !window.XLSX) {
                showToast("ライブラリの読み込み中です。数秒後にもう一度お試しください。", "error");
                return;
            }

            const newReports = [];
            for (const file of files) {
                try {
                    const data = await parseFile(file);
                    newReports.push({
                        id: generateUUID(),
                        fileName: file.name,
                        data: data,
                        status: 'pending',
                        results: null
                    });
                } catch (err) {
                    console.error(err);
                    showToast(`${file.name}の読み込みに失敗しました。`, "error");
                }
            }
            
            state.reports = [...state.reports, ...newReports];
            if (newReports.length > 0) {
                showToast(`${newReports.length}件のファイルを読み込みました。`);
            }
            renderReports();
        };

        /** --- AIとバリデーションロジック --- */
        const checkContentWithAI = async (content) => {
            const apiKey = encodeURIComponent(state.config.geminiApiKey.trim());

            const prompt = `
あなたは研修報告書の厳格な審査員です。以下の「受講者のレポート内容」を審査し、合否判定とNG理由、改善提案をJSON形式で出力してください。

【チェック基準（厳格に判定してください）】
1. 単なる感想文、意見文になっていないか
   - 「〜でよかった」「〜が面白かった」「勉強になった」といった感想のみはNG。
   - 研修で「具体的にできるようになったこと」や「実務での活かし方」が書かれているか。
2. 生成AIに丸投げしていないか
   - AI特有の無機質な箇条書き、一般的な用語の羅列はNG。
   - 主語が「生成AIは〜」となっており、受講者自身の言葉になっていないものはNG。
   - 普段の実務と生成AIの結びつきが、自身の言葉で語られているか。
3. 活かし方に具体性があるか
   - 「業務効率化に活かしたい」「様々な業務に適用したい」など、抽象的で一般的な活かし方の説明はNG。
   - 具体的に「どの業務」の「どの作業」にどう使うのかが書かれているか。

【絶対遵守の出力形式】
以下のJSONフォーマットのみを出力してください。マークダウンの装飾などは不要です。
{
  "isPass": false,
  "ngReasons": ["理由1", "理由2"],
  "improvementSuggestion": "改善案"
}

【受講者のレポート内容】
${content}
`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "あなたは厳格な研修報告書審査員です。指定されたJSON形式(isPass, ngReasons, improvementSuggestion)で結果を返してください。" }]
                },
                generationConfig: {
                    temperature: 0.2,
                    responseMimeType: "application/json"
                }
            };

            // 最も安定している gemini-1.5-flash をメインに使用
            let targetModel = "gemini-1.5-flash";
            let url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`;

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        let errStr = "Unknown Error";
                        try {
                            const errData = await response.json();
                            errStr = errData.error?.message || JSON.stringify(errData);
                        } catch(parseErr) {
                            errStr = "社内ネットワーク等による通信ブロック(HTMLが返却されました)";
                        }
                        
                        // 503(混雑) または 404(未発見) の場合は、空いている別モデル(1.5-flash-8b等)に切り替えてリトライ
                        if (response.status === 404 || response.status === 503) {
                            targetModel = targetModel === "gemini-1.5-flash" ? "gemini-1.5-flash-8b" : "gemini-1.5-flash";
                            url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`;
                        }

                        throw new Error(`HTTP ${response.status} - ${errStr}`);
                    }
                    
                    const data = await response.json();
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    
                    text = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                    const startIndex = text.indexOf('{');
                    const endIndex = text.lastIndexOf('}') + 1;
                    if(startIndex !== -1 && endIndex !== -1) {
                         text = text.substring(startIndex, endIndex);
                    }
                    
                    return JSON.parse(text);
                    
                } catch (e) {
                    if (i === 4) {
                        console.error("Gemini API failed after retries", e);
                        
                        let reasonMsg = e.message;
                        let suggestionMsg = "ネットワーク通信に失敗しました。";
                        
                        if (e.message.includes('HTTP 403') || e.message.includes('API_KEY_INVALID')) {
                            reasonMsg = "APIキーが無効、または権限がありません";
                            suggestionMsg = "設定したAPIキーが誤っているか、無効化されています。「設定パネル」から正しいキーを再設定してください。";
                        } else if (e.message.includes('HTTP 400')) {
                            reasonMsg = "不正なリクエスト (HTTP 400)";
                            suggestionMsg = "AIへの送信データ形式に問題があります。";
                        } else if (e.message.includes('HTTP 404')) {
                            reasonMsg = "AIモデルが見つかりません (HTTP 404)";
                            suggestionMsg = "Google側のAIモデルの仕様が変更された可能性があります。";
                        } else if (e.message.includes('HTTP 503')) {
                            reasonMsg = "AIサーバーが一時的に混雑しています";
                            suggestionMsg = "現在、世界中からGoogleのAIにアクセスが集中しており、処理が追いつかない状態です。数分ほど時間を置いてから再度「一括チェック実行」を押してください。";
                        } else if (e.message.includes('HTTP 429') || e.message.includes('quota')) {
                            reasonMsg = "通信の制限に達しました (HTTP 429)";
                            suggestionMsg = "Googleの無料枠制限を超過したため、処理を中断しました。しばらく時間を置いてからお試しください。";
                        }

                        return { 
                            isPass: false, 
                            ngReasons: [`通信エラー (${reasonMsg})`], 
                            improvementSuggestion: suggestionMsg,
                            isCriticalError: true
                        };
                    }
                    
                    // 一時待機ロジック
                    let waitTime = 5000;
                    if (e.message.includes('HTTP 429') || e.message.includes('quota')) {
                        waitTime = 15000; // 429の場合は少し長めに待つ
                        showToast(`Google AIの制限により一時待機中... (自動で再開します)`, 'info');
                    } else if (e.message.includes('HTTP 503')) {
                        waitTime = 8000;
                        showToast(`サーバー混雑のため待機中... (自動で別ルートを試します)`, 'info');
                    }
                    await new Promise(r => setTimeout(r, waitTime));
                }
            }
        };

        const runChecksLogic = async () => {
            if (!state.config.geminiApiKey || state.config.geminiApiKey.trim() === "") {
                showToast("APIキーが設定されていません。設定パネルから入力してください。", "error");
                state.isConfigOpen = true;
                renderSettings();
                return;
            }

            state.isChecking = true;
            renderReports(); 
            
            const pendingReports = state.reports.filter(r => r.status === 'pending');
            if (pendingReports.length === 0) {
                showToast("チェック対象がありません。", "error");
                state.isChecking = false;
                renderReports();
                return;
            }

            for (let i = 0; i < state.reports.length; i++) {
                const report = state.reports[i];
                if (report.status === 'done') continue;

                report.status = 'processing';
                renderReports(); 

                const formatErrors = [];
                const d = report.data;
                const normalize = s => s ? s.replace(/\s+/g, '').replace(/[（）()]/g, '') : '';
                
                const formatChecks = {
                    companyName: !!d.companyName,
                    userName: !!d.userName,
                    period: normalize(d.period).includes(normalize(state.config.period)),
                    location: normalize(d.location).includes(normalize(state.config.location)),
                    course: normalize(d.course).includes(normalize(state.config.course)),
                    contentLength: (d.content || "").length,
                    contentLengthValid: (d.content || "").length >= 300,
                    noAiSymbols: !(d.content || "").includes('*') && !(d.content || "").includes('＊')
                };

                if (!formatChecks.companyName) formatErrors.push("事業所の名称が記載されていません。");
                if (!formatChecks.userName) formatErrors.push("受講者氏名が記載されていません。");
                if (!formatChecks.period) formatErrors.push(`訓練の実施期間が設定と異なります。(抽出: ${d.period || '空欄'})`);
                if (!formatChecks.location) formatErrors.push(`訓練の実施場所が設定と異なります。(抽出: ${d.location || '空欄'})`);
                if (!formatChecks.course) formatErrors.push(`訓練コースの名称が設定と異なります。(抽出: ${d.course || '空欄'})`);
                if (!formatChecks.contentLengthValid) formatErrors.push(`内容の文字数が不足しています。(現在 ${formatChecks.contentLength}文字 / 300文字以上必要)`);
                if (!formatChecks.noAiSymbols) formatErrors.push(`内容にAI生成特有の記号「*」が含まれています。`);

                let aiResult = { isPass: true, ngReasons: [], improvementSuggestion: "形式エラーが存在するため、文章のAI審査をスキップしました。" };
                
                // 本文が一定以上ある場合のみAI通信を行う
                if ((d.content || "").length >= 100) { 
                    aiResult = await checkContentWithAI(d.content || "");
                    
                    // 重大な通信エラーが発生した場合は全体処理を安全に中断する
                    if (aiResult.isCriticalError) {
                        report.status = 'done';
                        report.results = { formatChecks, formatErrors, aiResult, overallPass: false };
                        renderReports();
                        showToast("通信エラーが発生したため、一括チェックを中断しました。", "error");
                        state.isChecking = false;
                        return;
                    }
                } else if ((d.content || "").length === 0) {
                    aiResult = { isPass: false, ngReasons: ["内容が白紙です。"], improvementSuggestion: "学んだことや今後の活かし方を記入してください。" };
                } else {
                    aiResult = { isPass: false, ngReasons: ["内容が極端に短すぎます。"], improvementSuggestion: "研修でできるようになったことや、今後の業務への活かし方を具体的に記載してください。" };
                }

                const overallPass = formatErrors.length === 0 && aiResult.isPass;
                
                report.status = 'done';
                report.results = { formatChecks, formatErrors, aiResult, overallPass };
                renderReports(); 

                // ▼▼ レートリミット(無料枠制限)回避のための待機処理 ▼▼
                // 次のレポートがあり、かつAIの審査を行った場合は「6秒間」休憩する（1分間に10件の安全ペース）
                if (i < state.reports.length - 1 && (d.content || "").length >= 100) {
                    await new Promise(resolve => setTimeout(resolve, 6000));
                }
            }

            state.isChecking = false;
            showToast("すべてのチェックが完了しました。");
            renderReports();
        };

        const sendToSpreadsheetLogic = async () => {
            if (!state.config.webhookUrl) {
                showToast('スプレッドシート連携（Webhook URL）が設定されていません。設定パネルをご確認ください。', 'error');
                state.isConfigOpen = true;
                renderSettings();
                return;
            }

            state.isSending = true;
            renderReports();

            const toCircleCross = (isValid) => isValid ? "〇" : "×";

            const payloadData = state.reports.filter(r => r.status === 'done').map(r => {
                const res = r.results;
                const fc = res.formatChecks;
                const d = r.data;
                
                return {
                    fileName: r.fileName,
                    companyName: d.companyName,
                    userName: d.userName,
                    overallPass: res.overallPass ? "合格" : "再提出",
                    chkCompany: toCircleCross(fc.companyName),
                    chkUser: toCircleCross(fc.userName),
                    chkPeriod: toCircleCross(fc.period),
                    chkLocation: toCircleCross(fc.location),
                    chkCourse: toCircleCross(fc.course),
                    contentLength: fc.contentLength,
                    formatErrors: res.formatErrors.join("\n") || "なし",
                    aiPass: toCircleCross(res.aiResult.isPass),
                    aiNgReasons: res.aiResult.isPass ? "なし" : res.aiResult.ngReasons.join("\n"),
                    improvementSuggestion: res.aiResult.improvementSuggestion
                };
            });

            try {
                await fetch(state.config.webhookUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadData)
                });
                showToast(`${payloadData.length}件のデータをスプレッドシートに転送しました！`);
            } catch (err) {
                console.error('Send error:', err);
                showToast('送信に失敗しました。URLが正しいか確認してください。', 'error');
            } finally {
                state.isSending = false;
                renderReports();
            }
        };

                                    <input type="text" value="${escapeHTML(rData.userName)}" onchange="app.updateReportData('${report.id}', 'userName', this.value)" class="w-full text-sm p-2 border border-slate-200 rounded outline-none focus:border-indigo-400">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-500">実施期間</label>
                                    <input type="text" value="${escapeHTML(rData.period)}" onchange="app.updateReportData('${report.id}', 'period', this.value)" class="w-full text-sm p-2 border border-slate-200 rounded outline-none focus:border-indigo-400">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-semibold text-slate-500">コース名称</label>
                                    <input type="text" value="${escapeHTML(rData.course)}" onchange="app.updateReportData('${report.id}', 'course', this.value)" class="w-full text-sm p-2 border border-slate-200 rounded outline-none focus:border-indigo-400">
                                </div>
                                <div class="space-y-1 md:col-span-2">
                                    <label class="text-xs font-semibold text-slate-500">実施場所</label>
                                    <input type="text" value="${escapeHTML(rData.location)}" onchange="app.updateReportData('${report.id}', 'location', this.value)" class="w-full text-sm p-2 border border-slate-200 rounded outline-none focus:border-indigo-400">
                                </div>
                                <div class="space-y-1 md:col-span-2">
                                    <label class="text-xs font-semibold text-slate-500 flex justify-between">
                                        内容（学んだこと、今後の活かし方）
                                        <span id="count-${report.id}" class="${(rData.content||'').length < 300 ? 'text-red-500' : 'text-green-600'}">${(rData.content||'').length} / 300文字以上</span>
                                    </label>
                                    <textarea 
                                        oninput="app.handleContentInput('${report.id}', this.value)"
                                        onchange="app.updateReportData('${report.id}', 'content', this.value)" 
                                        class="w-full text-sm p-3 border border-slate-200 rounded outline-none focus:border-indigo-400 min-h-[120px]"
                                    >${escapeHTML(rData.content)}</textarea>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }

                html += `</div>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;
            lucide.createIcons({ root: container });
        }

        /** --- 初期化 --- */
        function initApp() {
            renderSettings();
            renderReports();
        }

        // DOMが読み込まれたら描画スタート
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
